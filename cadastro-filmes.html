<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Eduardo — Cadastro de Filmes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Cine <span>Eduardo</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="cadastro-filmes.html" class="ativo">Filmes</a></li>
      <li><a href="cadastro-salas.html">Salas</a></li>
      <li><a href="salas.html">Ver Salas</a></li>
      <li><a href="cadastro-sessoes.html">Sessões</a></li>
      <li><a href="venda-ingressos.html">Ingressos</a></li>
      <li><a href="sessoes.html">Em Cartaz</a></li>
      <li><a href="#" onclick="logout()">🚪 Sair</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>🎥 Filmes</h1>
    <p>Cadastre novos filmes no sistema</p>
  </div>

  <div class="container">
    <div class="form-card">
      <div class="form-titulo">🎥 Novo Filme</div>

      <div id="alerta" class="alerta"></div>

      <form id="form-filme" novalidate>

        <div class="form-grupo">
          <label for="titulo">Título *</label>
          <input type="text" id="titulo" placeholder="Ex: Oppenheimer" required />
        </div>

        <div class="form-linha">
          <div class="form-grupo">
            <label for="genero">Gênero *</label>
            <select id="genero" required>
              <option value="">Selecione</option>
              <option>Ação</option>
              <option>Aventura</option>
              <option>Animação</option>
              <option>Comédia</option>
              <option>Drama</option>
              <option>Ficção Científica</option>
              <option>Horror</option>
              <option>Romance</option>
              <option>Suspense</option>
              <option>Documentário</option>
              <option>Outro</option>
            </select>
          </div>

          <div class="form-grupo">
            <label for="classificacao">Classificação Indicativa *</label>
            <select id="classificacao" required>
              <option value="">Selecione</option>
              <option>Livre</option>
              <option>10 anos</option>
              <option>12 anos</option>
              <option>14 anos</option>
              <option>16 anos</option>
              <option>18 anos</option>
            </select>
          </div>
        </div>

        <div class="form-linha">
          <div class="form-grupo">
            <label for="duracao">Duração (minutos) *</label>
            <input type="number" id="duracao" min="1" max="600" placeholder="Ex: 120" required />
          </div>

          <div class="form-grupo">
            <label for="estreia">Data de Estreia *</label>
            <input type="date" id="estreia" required />
          </div>
        </div>

        <div class="form-grupo">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" placeholder="Sinopse do filme..."></textarea>
        </div>

        <button type="submit" class="btn btn-primario btn-bloco">💾 Salvar Filme</button>
      </form>
    </div>
  </div>

  <footer>
    <strong>Cine Eduardo</strong> &mdash; Sistema Web de Controle de Cinema
  </footer>

  <script src="js/filmes.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
