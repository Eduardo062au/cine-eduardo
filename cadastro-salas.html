<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Eduardo — Cadastro de Salas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Cine <span>Eduardo</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="cadastro-filmes.html">Filmes</a></li>
      <li><a href="cadastro-salas.html" class="ativo">Salas</a></li>
      <li><a href="cadastro-sessoes.html">Sessões</a></li>
      <li><a href="venda-ingressos.html">Ingressos</a></li>
      <li><a href="sessoes.html">Em Cartaz</a></li>
      <li><a href="#" onclick="logout()">🚪 Sair</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>🏛️ Salas</h1>
    <p>Cadastre as salas do seu cinema</p>
  </div>

  <div class="container">
    <div class="form-card">
      <div class="form-titulo">🏛️ Nova Sala</div>

      <div id="alerta" class="alerta"></div>

      <form id="form-sala" novalidate>

        <div class="form-grupo">
          <label for="nome">Nome da Sala *</label>
          <input type="text" id="nome" placeholder="Ex: Sala 1, Sala VIP, IMAX Principal" required />
        </div>

        <div class="form-linha">
          <div class="form-grupo">
            <label for="capacidade">Capacidade (lugares) *</label>
            <input type="number" id="capacidade" min="1" max="2000" placeholder="Ex: 150" required />
          </div>

          <div class="form-grupo">
            <label for="tipo">Tipo *</label>
            <select id="tipo" required>
              <option value="">Selecione</option>
              <option value="2D">2D</option>
              <option value="3D">3D</option>
              <option value="IMAX">IMAX</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primario btn-bloco">💾 Salvar Sala</button>
      </form>
    </div>
  </div>

  <footer>
    <strong>Cine Eduardo</strong> &mdash; Sistema Web de Controle de Cinema
  </footer>

  <script src="js/salas.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
